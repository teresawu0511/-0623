<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>金門微醺夏意之旅 🏝️ (Firebase 雲端同步版)</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fuji: '#3B7AAE',
                        fujiLight: '#EBF2F7',
                        warmGray: '#F7F7F7',
                    },
                    fontFamily: { sans: ['Noto Sans TC', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #F7F7F7;
            background-image: radial-gradient(#3B7AAE 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="font-sans text-gray-800 h-screen w-screen flex flex-col overflow-hidden select-none">

    <!-- ======================================================= -->
    <!-- 📱 上半部：固定式記帳與分帳面板 (佔螢幕約 42% 高度) -->
    <!-- ======================================================= -->
    <div class="bg-white p-4 shadow-md border-b border-gray-200 shrink-0 z-10">
        <div class="flex justify-between items-center mb-2">
            <div>
                <h1 class="text-lg font-bold text-gray-800 tracking-wide">🏝️ 金門微醺夏意之旅</h1>
                <p class="text-[10px] text-gray-400">👥 Lee, Lin, Song, Wu · 雲端即時連線中</p>
            </div>
            <!-- 快速跳轉天數小按鈕 -->
            <div class="flex gap-1">
                <button onclick="scrollToDay('day1-section')" class="bg-fujiLight text-fuji px-2 py-1 rounded-lg text-xs font-bold">D1</button>
                <button onclick="scrollToDay('day2-section')" class="bg-fujiLight text-fuji px-2 py-1 rounded-lg text-xs font-bold">D2</button>
                <button onclick="scrollToDay('day3-section')" class="bg-fujiLight text-fuji px-2 py-1 rounded-lg text-xs font-bold">D3</button>
            </div>
        </div>
        
        <!-- 輸入區 -->
        <div class="space-y-2 bg-warmGray p-3 rounded-xl text-xs">
            <div class="grid grid-cols-2 gap-2">
                <input id="bill-desc" type="text" placeholder="品項 (例:租車)" class="w-full border border-gray-200 rounded-lg px-2.5 py-1.5 text-xs focus:outline-fuji bg-white">
                <input id="bill-amount" type="number" placeholder="金額 (元)" class="w-full border border-gray-200 rounded-lg px-2.5 py-1.5 text-xs focus:outline-fuji bg-white">
            </div>
            
            <div class="flex items-center justify-between gap-2">
                <span class="text-gray-500 shrink-0 font-medium">誰墊錢？</span>
                <div class="grid grid-cols-4 gap-1 w-full">
                    <label class="flex items-center gap-0.5 bg-white px-1 py-1 rounded-md border border-gray-200 justify-center text-[11px]"><input type="radio" name="payer" value="Lee" checked> Lee</label>
                    <label class="flex items-center gap-0.5 bg-white px-1 py-1 rounded-md border border-gray-200 justify-center text-[11px]"><input type="radio" name="payer" value="Lin"> Lin</label>
                    <label class="flex items-center gap-0.5 bg-white px-1 py-1 rounded-md border border-gray-200 justify-center text-[11px]"><input type="radio" name="payer" value="Song"> Song</label>
                    <label class="flex items-center gap-0.5 bg-white px-1 py-1 rounded-md border border-gray-200 justify-center text-[11px]"><input type="radio" name="payer" value="Wu"> Wu</label>
                </div>
            </div>
            <button onclick="addBillItem()" class="w-full bg-fuji text-white rounded-lg py-1.5 font-bold text-xs shadow-sm active:scale-[0.98] transition-all">👉 新增這筆消費明細</button>
        </div>

        <!-- 滾動即時結算區 -->
        <div class="mt-2 grid grid-cols-2 gap-2 pt-2 border-t border-gray-100">
            <!-- 左小框：消費明細 -->
            <div class="overflow-y-auto h-[65px] hide-scrollbar text-[11px] space-y-1 border border-dashed border-gray-200 p-1.5 rounded-lg bg-gray-50/50" id="bill-list">
                <p class="text-center text-gray-400 py-4">連線中...</p>
            </div>
            <!-- 右小框：清算與複製按鈕 -->
            <div class="flex flex-col justify-between h-[65px]">
                <div class="text-[10px] text-gray-600 bg-fujiLight/40 p-1.5 rounded-lg overflow-y-auto hide-scrollbar flex-1 leading-tight" id="settlement-result">
                    計算中...
                </div>
                <button onclick="copyToLine()" class="w-full bg-[#06C755] text-white rounded-md py-1 text-[11px] font-bold flex items-center justify-center gap-1 mt-1 active:scale-[0.98]">
                    <i class="fa-brands fa-line text-xs"></i> 複製發至 LINE
                </button>
            </div>
        </div>
    </div>

    <!-- ======================================================= -->
    <!-- 🗺️ 下半部：動態生成的行程區 (佔螢幕約 58% 高度) -->
    <!-- ======================================================= -->
    <div class="flex-1 overflow-y-auto px-4 py-4 space-y-6 pb-8" id="itinerary-scroll-container">
        <!-- 這裡的行程內容將改由 Firebase 撈取並即時動態生成，解決靜態網頁無法儲存修改的問題 -->
        <div id="loading-itinerary" class="text-center text-xs text-gray-400 py-10">
            <i class="fa-solid fa-circle-notch animate-spin text-fuji text-lg mb-2 block"></i>
            正在同步雲端行程資料...
        </div>
    </div>

    <!-- 彈窗：修改行程 -->
    <div id="edit-modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center p-6 z-50">
        <div class="bg-white rounded-2xl w-full max-w-xs p-5 space-y-4 shadow-xl">
            <h3 class="text-sm font-bold text-gray-800"><i class="fa-solid fa-pen-to-square text-fuji mr-1"></i> 修改行程內容</h3>
            <div class="space-y-2">
                <div>
                    <label class="text-[11px] text-gray-400 block mb-1">名稱/地點</label>
                    <input id="edit-input-title" type="text" class="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-xs focus:outline-fuji">
                </div>
                <div>
                    <label class="text-[11px] text-gray-400 block mb-1">時間或小提示</label>
                    <input id="edit-input-time" type="text" class="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-xs focus:outline-fuji">
                </div>
            </div>
            <div class="flex gap-2 pt-1 text-xs">
                <button onclick="closeEditModal()" class="w-1/2 bg-gray-100 text-gray-600 rounded-lg py-2">取消</button>
                <button onclick="saveSpotChange()" class="w-1/2 bg-fuji text-white rounded-lg py-2 font-medium">儲存更新</button>
            </div>
        </div>
    </div>

    <!-- ======================================================= -->
    <!-- 📦 Firebase SDK 模組引入與核心邏輯 -->
    <!-- ======================================================= -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 🛠️ 【 填入您的 FIREBASE 配置 】 🛠️
        const firebaseConfig = {
  apiKey: "AIzaSyA19Kv7Q1v_Gp3g-_gWY10JWcAuz9ky4aw",
  authDomain: "kimmem0623.firebaseapp.com",
  projectId: "kimmem0623",
  storageBucket: "kimmem0623.firebasestorage.app",
  messagingSenderId: "204852168975",
  appId: "1:204852168975:web:0fd75bde6a31727dbd167a",
  measurementId: "G-YN5244M53Y"
}; 

        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 全域變數定義
        let localBills = [];
        let localItinerary = {};
        const members = ['Lee', 'Lin', 'Song', 'Wu'];

        // 初始化行程預設資料（如果資料庫是空的，用此填補）
        const defaultItinerary = {
            day1: {
                title: "Day 1 · 小金門戰地探險 (06/27)",
                items: [
                    { id: "d1_1", type: "交通", color: "bg-fujiLight text-fuji", title: "立榮航空 B7-8955", info: "07:50 台中 ➔ 08:55 金門" },
                    { id: "d1_2", type: "食物", color: "bg-orange-50 text-orange-500", title: "喬安牧場", info: "11:30 | 特色牛肉麵必拍，門口方便停汽機車。" },
                    { id: "d1_3", type: "景點", color: "bg-emerald-50 text-emerald-600", title: "小金門 (沙溪堡、九宮坑道)", info: "下午行程 | 沙溪堡木棧道面向廈門的夕陽超美！" },
                    { id: "d1_4", type: "食物", color: "bg-orange-50 text-orange-500", title: "膩咖啡", info: "老宅文青風，建議汽機車停在外圍步行。" },
                    { id: "d1_5", type: "食物", color: "bg-orange-50 text-orange-500", title: "喜豐樓", info: "18:00 晚餐" },
                    { id: "d1_6", type: "酒店", color: "bg-purple-50 text-purple-600", title: "海福商務旅館", info: "辦理入住" }
                ]
            },
            day2: {
                title: "Day 2 · 古寧頭與古厝夜遊 (06/28)",
                items: [
                    { id: "d2_1", type: "食物", color: "bg-orange-50 text-orange-500", title: "永春廣東粥", info: "粥糜配上金黃香酥油條超級在地！" },
                    { id: "d2_2", type: "景點", color: "bg-emerald-50 text-emerald-600", title: "翟山坑道", info: "水道倒影是靈魂！用廣角拍對稱構圖。" },
                    { id: "d2_3", type: "景點", color: "bg-emerald-50 text-emerald-600", title: "北山播音牆、古寧頭", info: "巨型蜂巢播音牆仰拍非常震撼。" },
                    { id: "d2_4", type: "食物", color: "bg-orange-50 text-orange-500", title: "記德海鮮餐廳", info: "18:00 晚餐" }
                ]
            },
            day3: {
                title: "Day 3 · 獅山砲陣與沙美摩洛哥 (06/29)",
                items: [
                    { id: "d3_1", type: "景點", color: "bg-emerald-50 text-emerald-600", title: "馬山觀測站、獅山砲陣地", info: "觀看砲操表演" },
                    { id: "d3_2", type: "景點", color: "bg-emerald-50 text-emerald-600", title: "沙美摩洛哥", info: "土黃色頹屋極具中東異國風，穿鮮豔衣服拍超美！" },
                    { id: "d3_3", type: "交通", color: "bg-fujiLight text-fuji", title: "立榮航空 B7-8962", info: "18:20 金門 ➔ 19:20 台中" }
                ]
            }
        };

        // -------------------------------------------------------------
        // 🔄 1. 監聽 Firebase 帳目資料同步
        // -------------------------------------------------------------
        onValue(ref(db, 'kinmen_trip/bills'), (snapshot) => {
            const data = snapshot.val();
            localBills = [];
            if (data) {
                Object.keys(data).forEach(key => {
                    localBills.push({ id: key, ...data[key] });
                });
            }
            renderBills();
        });

        // -------------------------------------------------------------
        // 🔄 2. 監聽 Firebase 行程資料同步並動態渲染
        // -------------------------------------------------------------
        onValue(ref(db, 'kinmen_trip/itinerary'), (snapshot) => {
            let data = snapshot.val();
            if (!data) {
                // 如果 Firebase 資料庫目前全空，自動初始化寫入預設行程
                set(ref(db, 'kinmen_trip/itinerary'), defaultItinerary);
                data = defaultItinerary;
            }
            localItinerary = data;
            renderItinerary(data);
        });

        // 新增帳目至雲端
        window.addBillItem = function() {
            const desc = document.getElementById('bill-desc').value.trim();
            const amount = parseFloat(document.getElementById('bill-amount').value);
            const payer = document.querySelector('input[name="payer"]:checked').value;

            if (!desc || isNaN(amount) || amount <= 0) {
                alert('請填寫完整項目與金額！');
                return;
            }

            push(ref(db, 'kinmen_trip/bills'), { desc, amount, payer });
            document.getElementById('bill-desc').value = '';
            document.getElementById('bill-amount').value = '';
        };

        // 從雲端刪除帳目
        window.deleteBill = function(id) {
            remove(ref(db, `kinmen_trip/bills/${id}`));
        };

        // 行程編輯變數暫存與彈窗控制
        let targetDayKey = null;
        let targetSpotId = null;

        window.editSpot = function(dayKey, spotId) {
            targetDayKey = dayKey;
            targetSpotId = spotId;
            const dayItems = localItinerary[dayKey].items;
            const spot = dayItems.find(item => item.id === spotId);
            if (spot) {
                document.getElementById('edit-input-title').value = spot.title;
                document.getElementById('edit-input-time').value = spot.info;
                document.getElementById('edit-modal').style.display = 'flex';
            }
        };

        window.closeEditModal = function() {
            document.getElementById('edit-modal').style.display = 'none';
        };

        // 儲存行程修改回雲端
        window.saveSpotChange = function() {
            const newTitle = document.getElementById('edit-input-title').value.trim();
            const newInfo = document.getElementById('edit-input-time').value.trim();
            if (!newTitle) return alert('名稱不可為空');

            const dayItems = [...localItinerary[targetDayKey].items];
            const spotIndex = dayItems.findIndex(item => item.id === targetSpotId);
            
            if (spotIndex !== -1) {
                dayItems[spotIndex].title = newTitle;
                dayItems[spotIndex].info = newInfo;
                set(ref(db, `kinmen_trip/itinerary/${targetDayKey}/items`), dayItems).then(() => {
                    closeEditModal();
                });
            }
        };

        // -------------------------------------------------------------
        // 🎨 UI 渲染邏輯
        // -------------------------------------------------------------
        function renderBills() {
            const listContainer = document.getElementById('bill-list');
            if (localBills.length === 0) {
                listContainer.innerHTML = '<p class="text-center text-gray-400 py-4">暫無花費</p>';
                document.getElementById('settlement-result').innerHTML = '均分計算將顯示於此...';
                return;
            }

            listContainer.innerHTML = localBills.map(b => `
                <div class="flex justify-between items-center bg-white px-2 py-1 rounded-md border border-gray-100 text-[10px]">
                    <div class="truncate max-w-[65px]">
                        <span class="font-bold">${b.desc}</span>
                        <span class="text-[9px] text-fuji block">(${b.payer})</span>
                    </div>
                    <div class="flex items-center gap-1 shrink-0">
                        <span class="font-bold text-fuji">$${b.amount}</span>
                        <button onclick="deleteBill('${b.id}')" class="text-red-400"><i class="fa-regular fa-trash-can"></i></button>
                    </div>
                </div>
            `).join('');

            // 計算核心
            let totalExpenses = 0;
            let paidBy = { Lee: 0, Lin: 0, Song: 0, Wu: 0 };
            localBills.forEach(b => { totalExpenses += b.amount; paidBy[b.payer] += b.amount; });

            const sharePerPerson = totalExpenses / 4;
            let balance = {};
            members.forEach(m => { balance[m] = paidBy[m] - sharePerPerson; });

            let creditors = []; let debtors = [];
            members.forEach(m => {
                if (balance[m] > 0) creditors.push({ name: m, amount: balance[m] });
                if (balance[m] < 0) debtors.push({ name: m, amount: Math.abs(balance[m]) });
            });

            let transferLines = [];
            let c = 0, d = 0;
            let credCopy = JSON.parse(JSON.stringify(creditors));
            let debtCopy = JSON.parse(JSON.stringify(debtors));

            while (c < credCopy.length && d < debtCopy.length) {
                let credit = credCopy[c]; let debtor = debtCopy[d];
                let amount = Math.min(credit.amount, debtor.amount);
                transferLines.push(`▪️${debtor.name} ➔ ${credit.name} $${amount.toFixed(0)}`);
                credit.amount -= amount; debtor.amount -= amount;
                if (Math.abs(credit.amount) < 0.1) c++; if (Math.abs(debtor.amount) < 0.1) d++;
            }

            document.getElementById('settlement-result').innerHTML = `
                <p class="font-bold text-gray-800">總計:$${totalExpenses.toFixed(0)} (均分:$${sharePerPerson.toFixed(0)})</p>
                <div class="mt-0.5 space-y-0.5 border-t border-gray-200/60 pt-0.5 text-gray-500">
                    ${transferLines.length > 0 ? transferLines.join('<br>') : '🍀 金額剛好平分！'}
                </div>
            `;
        }

        function renderItinerary(data) {
            const container = document.getElementById('itinerary-scroll-container');
            let html = '';

            Object.keys(data).forEach(dayKey => {
                const day = data[dayKey];
                html += `
                    <div id="${dayKey}-section" class="bg-white/90 backdrop-blur-sm p-4 rounded-2xl shadow-sm border border-gray-100">
                        <h2 class="text-sm font-bold text-gray-800 flex items-center mb-3 pb-1 border-b border-gray-100">
                            <span class="w-2 h-4 bg-fuji rounded-full mr-1.5"></span>${day.title}
                        </h2>
                        <div class="space-y-3">
                `;

                day.items.forEach(item => {
                    html += `
                        <div class="bg-white rounded-xl p-3 shadow-sm border border-gray-100 relative">
                            <button onclick="editSpot('${dayKey}', '${item.id}')" class="absolute right-2 top-2 text-gray-400 text-xs"><i class="fa-solid fa-pen"></i></button>
                            <div class="flex items-start gap-2 text-xs">
                                <span class="${item.color} text-[10px] px-1.5 py-0.5 rounded font-bold shrink-0">${item.type}</span>
                                <div class="w-full pr-2">
                                    <h3 class="font-bold text-gray-800">${item.title}</h3>
                                    ${item.info ? `<p class="mt-1 text-[10px] text-gray-500 bg-warmGray p-2 rounded-lg">${item.info}</p>` : ''}
                                </div>
                            </div>
                        </div>
                    `;
                });

                html += `</div></div>`;
            });

            container.innerHTML = html;
        }

        // 複製至 LINE 功能
        window.copyToLine = function() {
            if (localBills.length === 0) { alert('目前沒有花費紀錄可以複製唷！'); return; }

            let totalExpenses = 0;
            let paidBy = { Lee: 0, Lin: 0, Song: 0, Wu: 0 };
            localBills.forEach(b => { totalExpenses += b.amount; paidBy[b.payer] += b.amount; });
            const sharePerPerson = totalExpenses / 4;

            let balance = {};
            members.forEach(m => { balance[m] = paidBy[m] - sharePerPerson; });

            let creditors = []; let debtors = [];
            members.forEach(m => {
                if (balance[m] > 0) creditors.push({ name: m, amount: balance[m] });
                if (balance[m] < 0) debtors.push({ name: m, amount: Math.abs(balance[m]) });
            });

            let transferLines = [];
            let c = 0, d = 0;
            while (c < creditors.length && d < debtors.length) {
                let credit = creditors[c]; let debtor = debtors[d];
                let amount = Math.min(credit.amount, debtor.amount);
                transferLines.push(`  ▪️ ${debtor.name} ➡️ 匯給 ${credit.name}：$${amount.toFixed(0)} 元`);
                credit.amount -= amount; debtor.amount -= amount;
                if (Math.abs(credit.amount) < 0.1) c++; if (Math.abs(debtor.amount) < 0.1) d++;
            }

            let msg = `🏝️ 金門微醺夏意之旅 - 實時雲端分帳報告 🏝️\n`;
            msg += `💰 總花費金額：$${totalExpenses.toFixed(0)} 元\n`;
            msg += `💵 每人應均分：$${sharePerPerson.toFixed(0)} 元\n\n`;
            msg += `📝 【消費明細摘要】\n`;
            localBills.forEach(b => { msg += ` · ${b.desc} : $${b.amount} (${b.payer}代墊)\n`; });
            msg += `\n📣 【最終轉帳通知】\n`;
            msg += transferLines.length > 0 ? transferLines.join('\n') : '  ▪️ 大家都互不相欠囉！';
            msg += `\n\n網址部署於 GitHub Pages，即時共同記帳超方便 ❤️`;

            navigator.clipboard.writeText(msg).then(() => {
                alert('✅ 分帳報告已複製！趕快去 LINE 群組貼上吧！');
            }).catch(err => { alert('複製失敗，請手動複製。'); });
        }

        // 快速滑動定位
        window.scrollToDay = function(id) {
            const element = document.getElementById(id);
            if (element) element.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    </script>
</body>
</html>
