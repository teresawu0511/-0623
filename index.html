<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>金門微醺夏意之旅 🏝️ (REST API 直連版)</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fuji: '#3B7AAE',
                        fujiLight: '#EBF2F7',
                        warmGray: '#F7F7F7',
                    },
                    fontFamily: { sans: ['Noto Sans TC', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #F7F7F7;
            background-image: radial-gradient(#3B7AAE 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="font-sans text-gray-800 h-screen w-screen flex flex-col overflow-hidden select-none">

    <!-- ======================================================= -->
    <!-- 📱 上半部：固定式記帳與分帳面板 -->
    <!-- ======================================================= -->
    <div class="bg-white p-4 shadow-md border-b border-gray-200 shrink-0 z-10">
        <div class="flex justify-between items-center mb-2">
            <div>
                <h1 class="text-lg font-bold text-gray-800 tracking-wide">🏝️ 金門微醺夏意之旅</h1>
                <p class="text-[10px] text-gray-400">👥 Lee, Lin, Song, Wu · 高速直連通道</p>
            </div>
            <div class="flex gap-1">
                <button onclick="scrollToDay('day1-section')" class="bg-fujiLight text-fuji px-2 py-1 rounded-lg text-xs font-bold">D1</button>
                <button onclick="scrollToDay('day2-section')" class="bg-fujiLight text-fuji px-2 py-1 rounded-lg text-xs font-bold">D2</button>
                <button onclick="scrollToDay('day3-section')" class="bg-fujiLight text-fuji px-2 py-1 rounded-lg text-xs font-bold">D3</button>
            </div>
        </div>
        
        <!-- 輸入區 -->
        <div class="space-y-2 bg-warmGray p-3 rounded-xl text-xs">
            <div class="grid grid-cols-2 gap-2">
                <input id="bill-desc" type="text" placeholder="品項 (例:租車)" class="w-full border border-gray-200 rounded-lg px-2.5 py-1.5 text-xs focus:outline-fuji bg-white">
                <input id="bill-amount" type="number" placeholder="金額 (元)" class="w-full border border-gray-200 rounded-lg px-2.5 py-1.5 text-xs focus:outline-fuji bg-white">
            </div>
            
            <div class="flex items-center justify-between gap-2">
                <span class="text-gray-500 shrink-0 font-medium">誰墊錢？</span>
                <div class="grid grid-cols-4 gap-1 w-full">
                    <label class="flex items-center gap-0.5 bg-white px-1 py-1 rounded-md border border-gray-200 justify-center text-[11px]"><input type="radio" name="payer" value="Lee" checked> Lee</label>
                    <label class="flex items-center gap-0.5 bg-white px-1 py-1 rounded-md border border-gray-200 justify-center text-[11px]"><input type="radio" name="payer" value="Lin"> Lin</label>
                    <label class="flex items-center gap-0.5 bg-white px-1 py-1 rounded-md border border-gray-200 justify-center text-[11px]"><input type="radio" name="payer" value="Song"> Song</label>
                    <label class="flex items-center gap-0.5 bg-white px-1 py-1 rounded-md border border-gray-200 justify-center text-[11px]"><input type="radio" name="payer" value="Wu"> Wu</label>
                </div>
            </div>
            <button onclick="addBillItem()" class="w-full bg-fuji text-white rounded-lg py-1.5 font-bold text-xs shadow-sm active:scale-[0.98] transition-all">👉 新增這筆消費明細</button>
        </div>

        <!-- 滾動即時結算區 -->
        <div class="mt-2 grid grid-cols-2 gap-2 pt-2 border-t border-gray-100">
            <div class="overflow-y-auto h-[65px] hide-scrollbar text-[11px] space-y-1 border border-dashed border-gray-200 p-1.5 rounded-lg bg-gray-50/50" id="bill-list">
                <p class="text-center text-gray-400 py-4">正在連線雲端...</p>
            </div>
            <div class="flex flex-col justify-between h-[65px]">
                <div class="text-[10px] text-gray-600 bg-fujiLight/40 p-1.5 rounded-lg overflow-y-auto hide-scrollbar flex-1 leading-tight" id="settlement-result">
                    計算中...
                </div>
                <button onclick="copyToLine()" class="w-full bg-[#06C755] text-white rounded-md py-1 text-[11px] font-bold flex items-center justify-center gap-1 mt-1 active:scale-[0.98]">
                    <i class="fa-brands fa-line text-xs"></i> 複製發至 LINE
                </button>
            </div>
        </div>
    </div>

    <!-- ======================================================= -->
    <!-- 🗺️ 下半部：行程區 -->
    <!-- ======================================================= -->
    <div class="flex-1 overflow-y-auto px-4 py-4 space-y-6 pb-8" id="itinerary-scroll-container">
        <div id="loading-itinerary" class="text-center text-xs text-gray-400 py-10">
            <i class="fa-solid fa-circle-notch animate-spin text-fuji text-lg mb-2 block"></i>
            正在載入雲端行程資料...
        </div>
    </div>

    <!-- 彈窗：修改/新增行程 -->
    <div id="edit-modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center p-6 z-50">
        <div class="bg-white rounded-2xl w-full max-w-xs p-5 space-y-4 shadow-xl">
            <h3 class="text-sm font-bold text-gray-800" id="modal-title"><i class="fa-solid fa-pen-to-square text-fuji mr-1"></i> 編輯行程</h3>
            <div class="space-y-2">
                <div>
                    <label class="text-[11px] text-gray-400 block mb-1">行程類型</label>
                    <select id="edit-input-type" class="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-xs focus:outline-fuji">
                        <option value="景點">景點 📍</option>
                        <option value="美食">美食 🍔</option>
                        <option value="交通">交通 ✈️</option>
                        <option value="住宿">住宿 🏨</option>
                        <option value="其他">其他 🏷️</option>
                    </select>
                </div>
                <div>
                    <label class="text-[11px] text-gray-400 block mb-1">名稱/地點</label>
                    <input id="edit-input-title" type="text" class="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-xs focus:outline-fuji">
                </div>
                <div>
                    <label class="text-[11px] text-gray-400 block mb-1">時間或備註說明</label>
                    <input id="edit-input-time" type="text" class="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-xs focus:outline-fuji">
                </div>
            </div>
            <div class="flex gap-2 pt-1 text-xs">
                <button onclick="closeEditModal()" class="w-1/2 bg-gray-100 text-gray-600 rounded-lg py-2">取消</button>
                <button onclick="saveSpotChange()" class="w-1/2 bg-fuji text-white rounded-lg py-2 font-medium">儲存更新</button>
            </div>
        </div>
    </div>

    <!-- ======================================================= -->
    <!-- 📦 REST API 直連通信邏輯 -->
    <!-- ======================================================= -->
    <script>
        // 🔗 直接繞過 SDK 機制，百分之百精準指向新加坡端點
        const BASE_URL = "https://kimmem0623-default-rtdb.asia-southeast1.firebasedatabase.app/kinmen_trip";

        let localBills = [];
        let localItinerary = {};
        const members = ['Lee', 'Lin', 'Song', 'Wu'];

        const emptyItinerary = {
            day1: { title: "Day 1 · 06/27 (六)", items: [] },
            day2: { title: "Day 2 · 06/28 (日)", items: [] },
            day3: { title: "Day 3 · 06/29 (一)", items: [] }
        };

        // 核心：自資料庫拉取最新數據
        async function fetchAllData() {
            try {
                const res = await fetch(`${BASE_URL}.json`);
                const data = await res.json();
                
                // 1. 處理花費資料
                localBills = [];
                if (data && data.bills) {
                    Object.keys(data.bills).forEach(key => {
                        localBills.push({ id: key, ...data.bills[key] });
                    });
                }
                renderBills();

                // 2. 處理行程資料
                if (!data || !data.itinerary) {
                    // 若資料庫全空，自動初始化空白結構
                    await fetch(`${BASE_URL}/itinerary.json`, {
                        method: 'PUT',
                        body: JSON.stringify(emptyItinerary)
                    });
                    localItinerary = emptyItinerary;
                } else {
                    localItinerary = data.itinerary;
                }
                renderItinerary(localItinerary);

            } catch (err) {
                console.error("資料庫連線失敗:", err);
            }
        }

        // 記帳：新增
        async function addBillItem() {
            const desc = document.getElementById('bill-desc').value.trim();
            const amount = parseFloat(document.getElementById('bill-amount').value);
            const payer = document.querySelector('input[name="payer"]:checked').value;
            if (!desc || isNaN(amount) || amount <= 0) return alert('請填寫完整項目與金額！');

            await fetch(`${BASE_URL}/bills.json`, {
                method: 'POST',
                body: JSON.stringify({ desc, amount, payer })
            });

            document.getElementById('bill-desc').value = '';
            document.getElementById('bill-amount').value = '';
            fetchAllData();
        }

        // 記帳：刪除
        async function deleteBill(id) {
            await fetch(`${BASE_URL}/bills/${id}.json`, { method: 'DELETE' });
            fetchAllData();
        }

        let targetDayKey = null; 
        let targetSpotId = null; 
        let isEditMode = false;

        // 行程：新增按鈕
        function openAddModal(dayKey) {
            isEditMode = false;
            targetDayKey = dayKey;
            document.getElementById('modal-title').innerHTML = '<i class="fa-solid fa-plus text-fuji mr-1"></i> 新增行程項目';
            document.getElementById('edit-input-title').value = '';
            document.getElementById('edit-input-time').value = '';
            document.getElementById('edit-input-type').value = '景點';
            document.getElementById('edit-modal').style.display = 'flex';
        }

        // 行程：編輯按鈕
        function editSpot(dayKey, spotId) {
            isEditMode = true;
            targetDayKey = dayKey; 
            targetSpotId = spotId;
            const dayData = localItinerary[dayKey] || {};
            const items = dayData.items || [];
            const spot = items.find(item => item.id === spotId);
            if (spot) {
                document.getElementById('modal-title').innerHTML = '<i class="fa-solid fa-pen-to-square text-fuji mr-1"></i> 編輯行程項目';
                document.getElementById('edit-input-title').value = spot.title;
                document.getElementById('edit-input-time').value = spot.info || '';
                document.getElementById('edit-input-type').value = spot.type || '景點';
                document.getElementById('edit-modal').style.display = 'flex';
            }
        }

        // 行程：刪除項目
        async function deleteSpot(dayKey, spotId) {
            if(!confirm('確定要刪除此行程嗎？')) return;
            const currentItems = localItinerary[dayKey].items || [];
            const dayItems = currentItems.filter(item => item.id !== spotId);
            
            await fetch(`${BASE_URL}/itinerary/${dayKey}/items.json`, {
                method: 'PUT',
                body: JSON.stringify(dayItems)
            });
            fetchAllData();
        }

        function closeEditModal() { document.getElementById('edit-modal').style.display = 'none'; }

        // 行程：儲存更新
        async function saveSpotChange() {
            const newTitle = document.getElementById('edit-input-title').value.trim();
            const newInfo = document.getElementById('edit-input-time').value.trim();
            const newType = document.getElementById('edit-input-type').value;
            if (!newTitle) return alert('名稱不可為空');

            let colorMap = {
                "景點": "bg-emerald-50 text-emerald-600",
                "美食": "bg-orange-50 text-orange-500",
                "交通": "bg-fujiLight text-fuji",
                "住宿": "bg-purple-50 text-purple-600",
                "其他": "bg-gray-100 text-gray-600"
            };

            let dayItems = (localItinerary[targetDayKey] && localItinerary[targetDayKey].items) ? [...localItinerary[targetDayKey].items] : [];
            
            if (isEditMode) {
                const idx = dayItems.findIndex(item => item.id === targetSpotId);
                if (idx !== -1) {
                    dayItems[idx].title = newTitle;
                    dayItems[idx].info = newInfo;
                    dayItems[idx].type = newType;
                    dayItems[idx].color = colorMap[newType];
                }
            } else {
                dayItems.push({
                    id: 'spot_' + Date.now(),
                    type: newType,
                    title: newTitle,
                    info: newInfo,
                    color: colorMap[newType]
                });
            }

            await fetch(`${BASE_URL}/itinerary/${targetDayKey}/items.json`, {
                method: 'PUT',
                body: JSON.stringify(dayItems)
            });
            
            closeEditModal();
            fetchAllData();
        }

        function scrollToDay(id) {
            const el = document.getElementById(id);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function renderBills() {
            const listContainer = document.getElementById('bill-list');
            if (localBills.length === 0) {
                listContainer.innerHTML = '<p class="text-center text-gray-400 py-4">暫無花費</p>';
                document.getElementById('settlement-result').innerHTML = '均分計算將顯示於此...';
                return;
            }
            listContainer.innerHTML = localBills.map(b => `
                <div class="flex justify-between items-center bg-white px-2 py-1 rounded-md border border-gray-100 text-[10px]">
                    <div class="truncate max-w-[65px]">
                        <span class="font-bold">${b.desc}</span>
                        <span class="text-[9px] text-fuji block">(${b.payer})</span>
                    </div>
                    <div class="flex items-center gap-1 shrink-0">
                        <span class="font-bold text-fuji">$${b.amount}</span>
                        <button onclick="deleteBill('${b.id}')" class="text-red-400"><i class="fa-regular fa-trash-can"></i></button>
                    </div>
                </div>
            `).join('');

            let totalExpenses = 0; let paidBy = { Lee: 0, Lin: 0, Song: 0, Wu: 0 };
            localBills.forEach(b => { totalExpenses += b.amount; paidBy[b.payer] += b.amount; });
            const share = totalExpenses / 4;
            let balance = {}; members.forEach(m => { balance[m] = paidBy[m] - share; });

            let creditors = []; let debtors = [];
            members.forEach(m => {
                if (balance[m] > 0) creditors.push({ name: m, amount: balance[m] });
                if (balance[m] < 0) debtors.push({ name: m, amount: Math.abs(balance[m]) });
            });

            let transferLines = []; let c = 0, d = 0;
            let credCopy = JSON.parse(JSON.stringify(creditors)); let debtCopy = JSON.parse(JSON.stringify(debtors));
            while (c < credCopy.length && d < debtCopy.length) {
                let credit = credCopy[c]; let debtor = debtCopy[d];
                let amount = Math.min(credit.amount, debtor.amount);
                transferLines.push(`▪️${debtor.name} ➔ ${credit.name} $${amount.toFixed(0)}`);
                credit.amount -= amount; debtor.amount -= amount;
                if (Math.abs(credit.amount) < 0.1) c++; if (Math.abs(debtor.amount) < 0.1) d++;
            }
            document.getElementById('settlement-result').innerHTML = `
                <p class="font-bold text-gray-800">總計:$${totalExpenses.toFixed(0)} (均分:$${share.toFixed(0)})</p>
                <div class="mt-0.5 space-y-0.5 border-t border-gray-200/60 pt-0.5 text-gray-500">${transferLines.length > 0 ? transferLines.join('<br>') : '🍀 金額剛好平分！'}</div>
            `;
        }

        function renderItinerary(data) {
            const container = document.getElementById('itinerary-scroll-container');
            let html = '';
            Object.keys(data).forEach(dayKey => {
                const day = data[dayKey];
                html += `
                    <div id="${dayKey}-section" class="bg-white/90 backdrop-blur-sm p-4 rounded-2xl shadow-sm border border-gray-100">
                        <div class="flex justify-between items-center mb-3 pb-1 border-b border-gray-100">
                            <h2 class="text-sm font-bold text-gray-800 flex items-center">
                                <span class="w-2 h-4 bg-fuji rounded-full mr-1.5"></span>${day.title}
                            </h2>
                            <button onclick="openAddModal('${dayKey}')" class="text-fuji text-xs font-bold bg-fujiLight px-2 py-1 rounded-md active:scale-95 transition-transform">
                                <i class="fa-solid fa-plus mr-0.5"></i> 新增項目
                            </button>
                        </div>
                        <div class="space-y-3">
                `;
                
                if(!day.items || day.items.length === 0) {
                    html += `<p class="text-center text-gray-300 text-[11px] py-4">目前沒有行程，請點選右上角新增 👆</p>`;
                } else {
                    day.items.forEach(item => {
                        html += `
                            <div class="bg-white rounded-xl p-3 shadow-sm border border-gray-100 relative group">
                                <div class="absolute right-2 top-2 flex gap-2">
                                    <button onclick="editSpot('${dayKey}', '${item.id}')" class="text-gray-400 text-xs hover:text-fuji"><i class="fa-solid fa-pen"></i></button>
                                    <button onclick="deleteSpot('${dayKey}', '${item.id}')" class="text-gray-400 text-xs hover:text-red-400"><i class="fa-solid fa-trash-can"></i></button>
                                </div>
                                <div class="flex items-start gap-2 text-xs">
                                    <span class="${item.color} text-[10px] px-1.5 py-0.5 rounded font-bold shrink-0">${item.type}</span>
                                    <div class="w-full pr-8">
                                        <h3 class="font-bold text-gray-800">${item.title}</h3>
                                        ${item.info ? `<p class="mt-1 text-[10px] text-gray-500 bg-warmGray p-2 rounded-lg">${item.info}</p>` : ''}
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }
                html += `</div></div>`;
            });
            container.innerHTML = html;
        }

        function copyToLine() {
            if (localBills.length === 0) return alert('目前沒有花費紀錄可以複製唷！');
            let totalExpenses = 0; let paidBy = { Lee: 0, Lin: 0, Song: 0, Wu: 0 };
            localBills.forEach(b => { totalExpenses += b.amount; paidBy[b.payer] += b.amount; });
            const share = totalExpenses / 4;
            let balance = {}; members.forEach(m => { balance[m] = paidBy[m] - share; });
            let creditors = []; let debtors = [];
            members.forEach(m => {
                if (balance[m] > 0) creditors.push({ name: m, amount: balance[m] });
                if (balance[m] < 0) debtors.push({ name: m, amount: Math.abs(balance[m]) });
            });
            let transferLines = []; let c = 0, d = 0;
            while (c < creditors.length && d < debtors.length) {
                let credit = creditors[c]; let debtor = debtors[d];
                let amount = Math.min(credit.amount, debtor.amount);
                transferLines.push(`  ▪️ ${debtor.name} ➡️ 匯給 ${credit.name}：$${amount.toFixed(0)} 元`);
                credit.amount -= amount; debtor.amount -= amount;
                if (Math.abs(credit.amount) < 0.1) c++; if (Math.abs(debtor.amount) < 0.1) d++;
            }
            let msg = `🏝️ 金門微醺夏意之旅 - 實時雲端分帳報告 🏝️\n💰 總花費金額：$${totalExpenses.toFixed(0)} 元\n💵 每人應均分：$${share.toFixed(0)} 元\n\n📝 【消費明細摘要】\n`;
            localBills.forEach(b => { msg += ` · ${b.desc} : $${b.amount} (${b.payer}代墊)\n`; });
            msg += `\n📣 【最終轉帳通知】\n` + (transferLines.length > 0 ? transferLines.join('\n') : '  ▪️ 大家都互不相欠囉！');
            navigator.clipboard.writeText(msg).then(() => { alert('✅ 分帳報告已複製！趕快去 LINE 群組貼上吧！'); });
        }

        // 頁面加載完成後自動載入資料，並設定每 5 秒自動重新載入實現簡易同步
        window.onload = () => {
            fetchAllData();
            setInterval(fetchAllData, 5000); 
        };
    </script>
</body>
</html>
